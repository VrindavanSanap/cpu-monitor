name: Deploy Backend

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.1

      - name: Build backend using Go
        run: |
          cd backend
          go build -o cpu-monitor
        
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
        
      - name: Deploy and Restart Backend
        run: |
          # 1. Stop the service (the '|| true' prevents pipeline crashes on the very first run)
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "sudo systemctl stop cpu-monitor || true"
          
          # 2. Upload the newly compiled binary to the server's temporary directory
          scp backend/cpu-monitor ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/tmp/cpu-monitor-binary
          
          # 3. Move the binary, set permissions, and restart the service via a multi-line SSH block
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            sudo mkdir -p /opt/cpu-monitor
            sudo mv /tmp/cpu-monitor-binary /opt/cpu-monitor/cpu-monitor
            sudo chmod +x /opt/cpu-monitor/cpu-monitor
            echo "API_KEY=${{ secrets.API_KEY }}" | sudo tee /opt/cpu-monitor/.env > /dev/null
            sudo chmod 600 /opt/cpu-monitor/.env
            sudo systemctl start cpu-monitor
          EOF